name: Build APK Fix Path
on: [push]

jobs:
  android-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Build Android
        run: |
          cd app/android # INI PERUBAHANNYA: Masuk ke folder app dulu
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: HuaweiManager-Fixed-E5577
          path: app/android/app/build/outputs/apk/release/*.apk # Jalur file APK juga disesuaikan
